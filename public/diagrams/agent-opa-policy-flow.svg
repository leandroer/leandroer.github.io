<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">OPA policy enforcement flow for an AI agent</title>
  <desc id="desc">An agent proposes an action, the application normalizes trusted context, and OPA returns allow, approval, or deny before credentials are attached and the tool executes.</desc>
  <defs><style>.bg{fill:#0d2749}.grid{stroke:#fff;stroke-opacity:.045}.box{fill:#173b68;stroke:#78aee8;stroke-width:1.5}.gate{fill:#234d7d;stroke:#a9d0f7;stroke-width:2}.allow{fill:#173e5d;stroke:#79b9de}.deny{fill:#492c3b;stroke:#e59687}.audit{fill:#122f54;stroke:#688aaf}.t{fill:#f5f9fd;font:600 19px Arial,sans-serif}.s{fill:#b6c9dd;font:14px Arial,sans-serif}.k{fill:#9dccff;font:700 12px Menlo,monospace;letter-spacing:1px}.line{fill:none;stroke:#9dccff;stroke-width:2}.muted{stroke:#7795b5}.red{stroke:#e59687}.label{fill:#9dccff;font:700 11px Menlo,monospace}.labelred{fill:#f0ab9d;font:700 11px Menlo,monospace}</style><pattern id="g" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" class="grid" fill="none"/></pattern><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0l8 4-8 4z" fill="#9dccff"/></marker><marker id="arrowred" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0l8 4-8 4z" fill="#e59687"/></marker></defs>
  <rect width="1200" height="720" class="bg"/><rect width="1200" height="720" fill="url(#g)"/><text x="58" y="55" class="k">AGENT ACTION / INDEPENDENT POLICY ENFORCEMENT</text>
  <rect x="58" y="95" width="250" height="105" rx="3" class="box"/><text x="83" y="132" class="t">Agent proposes action</text><text x="83" y="160" class="s">Tool, operation, target,</text><text x="83" y="181" class="s">and complete arguments</text>
  <rect x="360" y="95" width="280" height="105" rx="3" class="box"/><text x="385" y="132" class="t">Normalize trusted context</text><text x="385" y="160" class="s">Identity, resource, environment,</text><text x="385" y="181" class="s">risk, and action digest</text>
  <path d="M308 148h52" class="line" marker-end="url(#arrow)"/>
  <path d="M740 92l112 56-112 56-112-56z" class="gate"/><text x="690" y="143" class="t">OPA policy</text><text x="702" y="168" class="s">evaluation</text><path d="M640 148h11" class="line" marker-end="url(#arrow)"/>
  <rect x="935" y="70" width="205" height="82" rx="3" class="allow"/><text x="959" y="106" class="t">Allow</text><text x="959" y="130" class="s">Policy permits action</text>
  <rect x="935" y="183" width="205" height="95" rx="3" class="box"/><text x="959" y="220" class="t">Require approval</text><text x="959" y="245" class="s">Bind reviewer decision</text><text x="959" y="265" class="s">to the action digest</text>
  <rect x="935" y="310" width="205" height="82" rx="3" class="deny"/><text x="959" y="346" class="t">Deny</text><text x="959" y="370" class="s">Block and record reason</text>
  <path d="M850 130l85-19" class="line" marker-end="url(#arrow)"/><text x="862" y="105" class="label">ALLOW</text><path d="M832 172l103 43" class="line muted" marker-end="url(#arrow)"/><text x="844" y="214" class="label">APPROVAL</text><path d="M802 193l133 143" class="line red" marker-end="url(#arrowred)"/><text x="844" y="303" class="labelred">DENY</text>
  <rect x="635" y="445" width="250" height="105" rx="3" class="allow"/><text x="660" y="482" class="t">Tool gateway</text><text x="660" y="510" class="s">Attach scoped credentials only</text><text x="660" y="531" class="s">after authorization</text>
  <rect x="335" y="445" width="245" height="105" rx="3" class="box"/><text x="360" y="482" class="t">Execute action</text><text x="360" y="510" class="s">Target system applies the</text><text x="360" y="531" class="s">authorized operation</text>
  <rect x="58" y="445" width="225" height="105" rx="3" class="audit"/><text x="83" y="482" class="t">Audit result</text><text x="83" y="510" class="s">Decision ID, policy revision,</text><text x="83" y="531" class="s">approval, and target event</text>
  <path d="M1038 152v260H760v33" class="line" marker-end="url(#arrow)"/><path d="M1038 278v80c0 30-20 54-50 54H800v33" class="line muted" marker-end="url(#arrow)"/><path d="M635 498h-55" class="line" marker-end="url(#arrow)"/><path d="M335 498h-52" class="line" marker-end="url(#arrow)"/><path d="M935 351H170v94" class="line red" marker-end="url(#arrowred)"/>
  <text x="58" y="640" class="k">SECURITY BOUNDARY</text><text x="58" y="671" class="s">The agent proposes. Policy constrains authority. The enforcement layer owns the outcome.</text>
</svg>
